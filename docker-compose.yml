version: '3'

services:
  n8n:
    image: n8nio/n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./data:/home/node/.n8n-files
    ports:
      - "5678:5678"

  postgres:
    image: postgres
    container_name: postgres_n8n
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=quality_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data: